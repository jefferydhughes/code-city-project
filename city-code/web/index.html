<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CodeCity</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; height: 100vh; background: #1a1a2e; font-family: Arial, sans-serif; }

    #godot-container {
      flex: 0 0 60%;
      position: relative;
      background: #000;
    }
    canvas#canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #code-panel {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      background: #FAF7F2;
      border-left: 2px solid #EDE6DB;
    }

    #panel-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #FFFFFF;
      border-bottom: 1px solid #EDE6DB;
      height: 48px;
    }

    .mode-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 2px solid #43A7BE;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: all 0.15s;
    }
    .mode-btn.active {
      background: #43A7BE;
      color: white;
      border-color: #43A7BE;
    }
    .mode-btn:not(.active) {
      background: transparent;
      color: #43A7BE;
    }

    #run-btn {
      margin-left: auto;
      padding: 8px 20px;
      background: #43A7BE;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    #run-btn:hover { background: #3896ad; }

    #blockly-div {
      flex: 1;
      overflow: hidden;
    }

    #text-editor {
      flex: 1;
      display: none;
      padding: 12px;
    }
    #text-editor textarea {
      width: 100%;
      height: 100%;
      font-family: monospace;
      font-size: 14px;
      border: 1px solid #EDE6DB;
      border-radius: 6px;
      padding: 8px;
      resize: none;
      background: #FFFFFF;
      color: #4A5568;
    }

    #status-bar {
      padding: 6px 12px;
      font-size: 12px;
      color: #2A9D8F;
      background: #FFFFFF;
      border-top: 1px solid #EDE6DB;
      min-height: 28px;
    }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      #godot-container { flex: 1; }
      #code-panel {
        flex: 0 0 50%;
        border-left: none;
        border-top: 2px solid #EDE6DB;
      }
    }
  </style>
</head>
<body>

<div id="godot-container">
  <canvas id="canvas"></canvas>
</div>

<div id="code-panel">
  <div id="panel-topbar">
    <button class="mode-btn active" id="btn-blocks" onclick="switchMode('blocks')">Blocks</button>
    <button class="mode-btn" id="btn-text" onclick="switchMode('text')">Text</button>
    <button id="run-btn" onclick="runCode()">Run</button>
  </div>

  <div id="blockly-div"></div>
  <div id="text-editor"><textarea id="code-textarea" placeholder="// Write code here..."></textarea></div>
  <div id="status-bar"></div>
</div>

<!-- Blockly -->
<script src="https://unpkg.com/blockly/blockly.min.js"></script>

<!-- CodeCity block definitions -->
<script src="codecity_blocks.js"></script>

<!-- Godot web export bootstrap -->
<script src="index.js"></script>

<script>
// ==============================
// BLOCKLY WORKSPACE SETUP
// ==============================

var workspace = null;

function initBlockly(toolboxXml) {
  workspace = Blockly.inject('blockly-div', {
    toolbox: toolboxXml || defaultToolbox(),
    scrollbars: true,
    trashcan: true,
    theme: codeCityTheme(),
    grid: { spacing: 20, length: 3, colour: '#EDE6DB', snap: true },
    zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 1.5, minScale: 0.5 }
  });

  workspace.addChangeListener(function(event) {
    if (event.type === Blockly.Events.BLOCK_CHANGE ||
        event.type === Blockly.Events.BLOCK_CREATE ||
        event.type === Blockly.Events.BLOCK_DELETE ||
        event.type === Blockly.Events.BLOCK_MOVE) {
      var code = generateCode();
      sendCodeToGodot(code);
    }
  });
}

function codeCityTheme() {
  return Blockly.Theme.defineTheme('codecity', {
    base: Blockly.Themes.Classic,
    blockStyles: {
      city_blocks: { colourPrimary: '#7CCB92' },
      road_blocks: { colourPrimary: '#D9B26F' },
      resource_blocks: { colourPrimary: '#6FA8DC' },
      people_blocks: { colourPrimary: '#F4A261' },
      event_blocks: { colourPrimary: '#C084D4' },
      lesson_blocks: { colourPrimary: '#E76F51' },
      logic_blocks: { colourPrimary: '#8D99AE' },
      variable_blocks: { colourPrimary: '#B56576' },
    },
    componentStyles: {
      workspaceBackgroundColour: '#FFFFFF',
      toolboxBackgroundColour: '#F4EFE7',
      toolboxForegroundColour: '#4A5568',
      flyoutBackgroundColour: '#FAF7F2',
      flyoutForegroundColour: '#4A5568',
      scrollbarColour: '#43A7BE',
      insertionMarkerColour: '#43A7BE',
      markerColour: '#43A7BE',
      cursorColour: '#43A7BE',
    }
  });
}

function defaultToolbox() {
  return CODECITY_TOOLBOX_XML;
}

// ==============================
// CODE GENERATION
// ==============================

function generateCode() {
  if (!workspace) return '';
  try {
    return Blockly.JavaScript.workspaceToCode(workspace);
  } catch(e) {
    return '';
  }
}

// ==============================
// MODE SWITCHING
// ==============================

var currentMode = 'blocks';

function switchMode(mode) {
  currentMode = mode;

  document.getElementById('btn-blocks').classList.toggle('active', mode === 'blocks');
  document.getElementById('btn-text').classList.toggle('active', mode === 'text');
  document.getElementById('blockly-div').style.display = mode === 'blocks' ? 'flex' : 'none';
  document.getElementById('text-editor').style.display = mode === 'text' ? 'flex' : 'none';

  if (mode === 'text') {
    document.getElementById('code-textarea').value = generateCode();
  }
}

// ==============================
// GODOT <-> BLOCKLY BRIDGE
// ==============================

function setToolbox(toolboxXml) {
  if (!workspace) { initBlockly(toolboxXml); return; }
  workspace.updateToolbox(toolboxXml);
}

function setStarterBlocks(xmlText) {
  if (!workspace) return;
  workspace.clear();
  if (!xmlText || xmlText === '') return;
  try {
    var xml = Blockly.utils.xml.textToDom(xmlText);
    Blockly.Xml.domToWorkspace(xml, workspace);
  } catch(e) {
    console.warn('setStarterBlocks parse error:', e);
  }
}

function setStatusText(text, isError) {
  var bar = document.getElementById('status-bar');
  bar.textContent = text;
  bar.style.color = isError ? '#E38B59' : '#2A9D8F';
}

function sendCodeToGodot(code) {
  if (window.godot_js_wrapper && window.godot_js_wrapper.send) {
    window.godot_js_wrapper.send('code_changed', code);
  }
}

function runCode() {
  var code;
  if (currentMode === 'blocks') {
    code = generateCode();
  } else {
    code = document.getElementById('code-textarea').value;
  }
  if (window.godot_js_wrapper && window.godot_js_wrapper.send) {
    window.godot_js_wrapper.send('run_pressed', code);
  }
}

// ==============================
// GODOT JS WRAPPER SETUP
// ==============================

window.codecity = {
  setToolbox: setToolbox,
  setStarterBlocks: setStarterBlocks,
  setStatusText: setStatusText,
};

window.addEventListener('load', function() {
  initBlockly(null);
  switchMode('blocks');
});
</script>
</body>
</html>
